<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danke — Studio Jessica Schmidt</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="robots" content="noindex">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Satoshi', -apple-system, sans-serif;
            background-color: #F5F5F0;
            color: #2C1810;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .wrapper { max-width: 480px; }
        .dot {
            width: 12px; height: 12px;
            background: #FF6B35;
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 32px;
        }
        h1 {
            font-size: clamp(28px, 6vw, 48px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
        }
        p {
            font-size: 17px;
            line-height: 1.7;
            opacity: 0.75;
            margin-bottom: 40px;
        }
        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2C1810;
            color: #F5F5F0;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="dot"></div>
        <h1>Danke für deine Nachricht.</h1>
        <p>Ich melde mich innerhalb von 48 Stunden bei dir.</p>
        <a href="/">← Zurück zur Startseite</a>
    </div>
</body>
</html>
